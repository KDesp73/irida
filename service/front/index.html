<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irida</title>
    <meta name="theme-color" content="#141414">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="/static/libs/chessboard-1.0.0.min.css">
    <script src="/static/libs/chess.min.js"></script>
    <script src="/static/libs/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="shell">
    <header class="toolbar">
        <span class="toolbar-brand">Irida</span>

        <div class="toolbar-group">
            <select id="engineSelect" title="Engine"></select>
            <button type="button" class="btn btn-primary" onclick="loadEngine()">Load</button>
        </div>

        <div class="toolbar-group">
            <label class="toolbar-mini" for="depth">Depth</label>
            <input id="depth" class="input-depth" type="number" value="6" min="1" max="64">
        </div>

        <div class="toolbar-group">
            <label class="toolbar-mini" for="playerSide">Side</label>
            <select id="playerSide" title="Your color" onchange="updateOrientation()">
                <option value="white">White</option>
                <option value="black">Black</option>
            </select>
        </div>

        <button type="button" class="btn" onclick="resetGame()">Reset</button>
        <button type="button" id="btnEngineTurn" class="btn btn-primary" onclick="requestEngineMove()" hidden>Engine</button>

        <span class="toolbar-fill"></span>

        <div class="toolbar-status" role="status">
            <span id="status-phase">Idle</span><span id="status-turn"></span>
        </div>
    </header>

    <div class="toolbar toolbar--uci">
        <label class="toolbar-mini" for="raw">UCI</label>
        <input id="raw" class="toolbar-raw" type="text" placeholder="Command…" autocomplete="off">
        <button type="button" class="btn" onclick="sendRaw()">Send</button>
    </div>

    <main class="main">
        <div class="board-wrap board-wrap--locked" id="board-wrap">
            <div id="board" class="chessboard-root"></div>
        </div>

        <div class="grid-2">
            <section class="card">
                <h2 class="card-title">Moves</h2>
                <div id="move-list" class="move-list"></div>
            </section>
            <section class="card">
                <h2 class="card-title">Analysis</h2>
                <div id="llm-explanation" class="analysis">
                    <span class="muted">—</span>
                </div>
                <div id="llm-loader" class="loader" hidden>
                    <span class="spinner" aria-hidden="true"></span>
                    <span>…</span>
                </div>
            </section>
        </div>

        <section class="card card--log">
            <h2 class="card-title">Log</h2>
            <div id="console" class="log" role="log" aria-live="polite"></div>
        </section>

        <section class="card">
            <h2 class="card-title">FEN / PGN</h2>
            <textarea id="fenInput" class="input-fen" rows="2" spellcheck="false" placeholder="FEN"></textarea>
            <div class="btn-group">
                <button type="button" class="btn btn-primary" onclick="loadFenFromField()">Load FEN</button>
                <button type="button" class="btn" onclick="syncFenFromBoard()">From board</button>
                <button type="button" class="btn" onclick="downloadPgn()">PGN file</button>
                <button type="button" class="btn" onclick="copyPgn()">Copy PGN</button>
            </div>
        </section>
    </main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
