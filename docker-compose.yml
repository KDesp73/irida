services:
  irida:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-8765}:8765"
    environment:
      PORT: "8765"
      LD_LIBRARY_PATH: /engines/lib
    volumes:
      - ${IRIDA_ENGINE_PATH:-./irida}:/engines/irida:ro
      - ${IRIDA_LIBS_PATH:-./deps/lib/linux}:/engines/lib:ro
    restart: unless-stopped
